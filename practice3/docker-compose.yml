version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: practice3_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: practice3
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web-app:
    build: .
    container_name: practice3_app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: practice3
      DB_SSLMODE: disable
    volumes:
      - ./database/migrations:/app/database/migrations
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: